apiVersion: v1
kind: Service
metadata:
  name: zk-hs
  labels:
    app: zk
spec:
  clusterIP: None
  selector:
    app: zk
  ports:
    - name: client
      port: 2181
    - name: server
      port: 2888
    - name: leader-election
      port: 3888
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zk
spec:
  serviceName: zk-hs
  replicas: 5
  selector:
    matchLabels:
      app: zk
  template:
    metadata:
      labels:
        app: zk
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: zookeeper
          image: zookeeper:3.9
          command:
            - sh
            - -c
            - |
              ORD=$(hostname | awk -F'-' '{print $NF}')
              MY_ID=$((ORD + 1))
              mkdir -p /data
              echo "${MY_ID}" > /data/myid
              export ZOO_MY_ID="${MY_ID}"
              export ZOO_SERVERS="server.1=zk-0.zk-hs.default.svc.cluster.local:2888:3888;2181 server.2=zk-1.zk-hs.default.svc.cluster.local:2888:3888;2181 server.3=zk-2.zk-hs.default.svc.cluster.local:2888:3888;2181 server.4=zk-3.zk-hs.default.svc.cluster.local:2888:3888;2181 server.5=zk-4.zk-hs.default.svc.cluster.local:2888:3888;2181"
              exec /docker-entrypoint.sh zkServer.sh start-foreground
          ports:
            - containerPort: 2181
              name: client
            - containerPort: 2888
              name: server
            - containerPort: 3888
              name: leader-election
